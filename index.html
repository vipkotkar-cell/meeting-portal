<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Portal | Warehouse Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #FAFAFA; --bg-card: #FFFFFF; --bg-section: #F5F7FA;
            --bg-sidebar: #1E293B; --bg-sidebar-hover: #334155; --bg-sidebar-active: #3B82F6;
            --text-primary: #1A1D21; --text-secondary: #5E6670; --text-muted: #8C939D; --text-sidebar: #CBD5E1;
            --accent-blue: #2563EB; --accent-blue-light: #EFF6FF;
            --accent-green: #059669; --accent-green-light: #ECFDF5;
            --accent-amber: #D97706; --accent-amber-light: #FFFBEB;
            --accent-purple: #7C3AED; --accent-purple-light: #F5F3FF;
            --accent-rose: #E11D48; --accent-rose-light: #FFF1F2;
            --accent-cyan: #0891B2; --accent-cyan-light: #ECFEFF;
            --border-light: #E5E7EB; --border-medium: #D1D5DB;
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06); --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
            --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px;
            --sidebar-width: 280px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; display: flex; }
        
        .sidebar { width: var(--sidebar-width); background: var(--bg-sidebar); min-height: 100vh; position: fixed; left: 0; top: 0; bottom: 0; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-header { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; color: #fff; font-weight: 600; font-size: 16px; }
        .sidebar-logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .sidebar-logo-icon svg { width: 20px; height: 20px; color: #fff; }
        .sidebar-section { padding: 16px 12px; }
        .sidebar-section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 8px; margin-bottom: 8px; }
        
        .import-granola-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 16px; margin: 8px 12px; background: linear-gradient(135deg, #10B981, #059669); border: none; border-radius: var(--radius-sm); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .import-granola-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); }
        .import-granola-btn svg { width: 20px; height: 20px; }
        
        .meeting-list { display: flex; flex-direction: column; gap: 4px; max-height: calc(100vh - 300px); overflow-y: auto; }
        .meeting-item { padding: 12px 16px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s ease; }
        .meeting-item:hover { background: var(--bg-sidebar-hover); }
        .meeting-item.active { background: var(--bg-sidebar-active); }
        .meeting-item-date { font-size: 14px; font-weight: 500; color: #fff; display: flex; align-items: center; gap: 8px; }
        .meeting-item-title { font-size: 12px; color: var(--text-sidebar); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meeting-item-meta { display: flex; gap: 8px; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .meeting-item.active .meeting-item-title, .meeting-item.active .meeting-item-meta { color: rgba(255,255,255,0.85); }
        .today-badge { background: var(--accent-green); color: #fff; font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 10px; text-transform: uppercase; }
        
        .add-meeting-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 16px; margin: 8px 12px; background: rgba(255,255,255,0.1); border: 1px dashed rgba(255,255,255,0.3); border-radius: var(--radius-sm); color: var(--text-sidebar); font-size: 13px; cursor: pointer; }
        .add-meeting-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .add-meeting-btn svg { width: 16px; height: 16px; }
        
        .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); }
        .storage-info { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: rgba(255,255,255,0.05); border-radius: var(--radius-sm); font-size: 11px; color: var(--text-muted); }
        .storage-info svg { width: 14px; height: 14px; }
        
        .main-wrapper { flex: 1; margin-left: var(--sidebar-width); min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, #1E3A5F 0%, #2D5A87 50%, #1E3A5F 100%); padding: 48px 24px 80px; position: relative; }
        .header-content { max-width: 1000px; margin: 0 auto; }
        .header-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 50px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.9); margin-bottom: 20px; }
        .header-badge svg { width: 14px; height: 14px; }
        .header h1 { font-family: 'Fraunces', serif; font-size: clamp(24px, 4vw, 36px); font-weight: 600; color: #fff; margin-bottom: 12px; }
        .header-meta { display: flex; flex-wrap: wrap; gap: 24px; color: rgba(255,255,255,0.8); font-size: 14px; }
        .header-meta-item { display: flex; align-items: center; gap: 8px; }
        .header-meta-item svg { width: 16px; height: 16px; opacity: 0.7; }
        
        .container { max-width: 1000px; margin: -48px auto 48px; padding: 0 24px; position: relative; z-index: 2; }
        
        /* Summary Card */
        .summary-card { background: linear-gradient(135deg, var(--accent-cyan-light), #fff); border: 1px solid rgba(8, 145, 178, 0.2); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow-md); }
        .summary-card h3 { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; color: var(--accent-cyan); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .summary-card h3 svg { width: 20px; height: 20px; }
        .summary-text { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }
        .summary-highlights { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
        .summary-highlight { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: #fff; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-primary); border: 1px solid var(--border-light); }
        .summary-highlight svg { width: 16px; height: 16px; color: var(--accent-cyan); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); border-radius: var(--radius-md); padding: 20px; box-shadow: var(--shadow-md); border: 1px solid var(--border-light); }
        .stat-label { font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-value { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--text-primary); }
        .stat-card.blue { border-top: 3px solid var(--accent-blue); }
        .stat-card.green { border-top: 3px solid var(--accent-green); }
        .stat-card.amber { border-top: 3px solid var(--accent-amber); }
        .stat-card.purple { border-top: 3px solid var(--accent-purple); }
        
        .card { background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); border: 1px solid var(--border-light); overflow: hidden; margin-bottom: 24px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .card-header:hover { background: var(--bg-section); }
        .card-header h2 { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .card-header h2 svg { width: 20px; height: 20px; }
        .card-toggle { width: 28px; height: 28px; border-radius: 50%; background: var(--bg-section); display: flex; align-items: center; justify-content: center; transition: transform 0.3s; }
        .card-toggle svg { width: 16px; height: 16px; color: var(--text-secondary); }
        .card.collapsed .card-toggle { transform: rotate(-90deg); }
        .card-body { padding: 24px; }
        .card.collapsed .card-body { display: none; }
        
        .discussion-item { padding: 16px; background: var(--bg-section); border-radius: var(--radius-md); margin-bottom: 12px; border-left: 4px solid var(--accent-blue); }
        .discussion-item:nth-child(2) { border-left-color: var(--accent-green); }
        .discussion-item:nth-child(3) { border-left-color: var(--accent-purple); }
        .discussion-item:nth-child(4) { border-left-color: var(--accent-amber); }
        .discussion-item:nth-child(5) { border-left-color: var(--accent-rose); }
        .discussion-title { font-weight: 600; font-size: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .discussion-number { background: var(--text-primary); color: #fff; font-size: 11px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .discussion-content { font-size: 14px; color: var(--text-secondary); }
        .discussion-content ul { margin: 8px 0 0 20px; }
        .discussion-content li { margin-bottom: 4px; }
        .discussion-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        
        .tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; text-decoration: none; transition: all 0.2s; }
        .tag:hover { transform: translateY(-1px); }
        .tag-shailendra { background: linear-gradient(135deg, #EFF6FF, #DBEAFE); color: #1E40AF; }
        .tag-shashank { background: linear-gradient(135deg, #ECFDF5, #D1FAE5); color: #065F46; }
        .tag-manan { background: linear-gradient(135deg, #F5F3FF, #EDE9FE); color: #5B21B6; }
        .tag-vipul { background: linear-gradient(135deg, #FFFBEB, #FEF3C7); color: #92400E; }
        .tag svg { width: 12px; height: 12px; }
        
        .decision-item { display: flex; gap: 12px; padding: 14px; background: var(--accent-green-light); border-radius: var(--radius-md); margin-bottom: 10px; border: 1px solid rgba(5,150,105,0.2); }
        .decision-icon { width: 24px; height: 24px; background: var(--accent-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .decision-icon svg { width: 14px; height: 14px; color: #fff; }
        .decision-text { font-size: 14px; color: var(--text-primary); }
        
        .action-item { padding: 14px; border: 1px solid var(--border-light); border-radius: var(--radius-md); margin-bottom: 10px; }
        .action-item:hover { border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--accent-blue-light); }
        .action-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
        .action-task { font-weight: 500; font-size: 14px; flex: 1; }
        .action-status { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 50px; text-transform: uppercase; white-space: nowrap; }
        .status-pending { background: var(--accent-amber-light); color: var(--accent-amber); }
        .status-urgent { background: var(--accent-rose-light); color: var(--accent-rose); }
        .status-upcoming { background: var(--accent-blue-light); color: var(--accent-blue); }
        .status-completed { background: var(--accent-green-light); color: var(--accent-green); }
        .action-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; color: var(--text-secondary); }
        .action-meta-item { display: flex; align-items: center; gap: 6px; }
        .action-meta-item svg { width: 14px; height: 14px; color: var(--text-muted); }
        
        .attendees-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .attendee-card { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--bg-section); border-radius: var(--radius-sm); text-decoration: none; color: inherit; }
        .attendee-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .attendee-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 15px; color: #fff; }
        .attendee-name { font-weight: 500; font-size: 14px; }
        .attendee-email { font-size: 11px; color: var(--text-muted); }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal { background: var(--bg-card); border-radius: var(--radius-lg); width: 90%; max-width: 560px; max-height: 90vh; overflow: hidden; box-shadow: var(--shadow-lg); transform: translateY(20px); transition: transform 0.3s; }
        .modal-overlay.show .modal { transform: translateY(0); }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
        .modal-header h3 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }
        .modal-close { width: 32px; height: 32px; border: none; background: var(--bg-section); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--accent-rose-light); }
        .modal-close svg { width: 16px; height: 16px; }
        .modal-body { padding: 24px; overflow-y: auto; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border-light); display: flex; justify-content: flex-end; gap: 12px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: 2px solid var(--border-light); background: var(--bg-section); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .tab-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .tab-btn.active { border-color: var(--accent-blue); background: var(--accent-blue-light); color: var(--accent-blue); }
        .tab-btn svg { width: 18px; height: 18px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px 14px; border: 1px solid var(--border-light); border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; }
        .form-input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--accent-blue-light); }
        .form-textarea { width: 100%; min-height: 180px; padding: 12px 14px; border: 1px solid var(--border-light); border-radius: var(--radius-sm); font-family: 'DM Sans', monospace; font-size: 13px; line-height: 1.6; resize: vertical; }
        .form-textarea:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--accent-blue-light); }
        .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
        
        .btn { padding: 10px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-secondary { background: var(--bg-section); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--border-light); }
        .btn-primary { background: var(--accent-blue); color: #fff; }
        .btn-primary:hover { background: #1D4ED8; }
        .btn-success { background: var(--accent-green); color: #fff; }
        .btn-success:hover { background: #047857; }
        
        .parsing-indicator { display: none; align-items: center; justify-content: center; gap: 12px; padding: 20px; background: var(--accent-blue-light); border-radius: var(--radius-md); margin-bottom: 16px; }
        .parsing-indicator.show { display: flex; }
        .spinner { width: 24px; height: 24px; border: 3px solid var(--border-light); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .notification { position: fixed; bottom: 24px; right: 24px; background: var(--accent-green); color: #fff; padding: 12px 20px; border-radius: var(--radius-md); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1001; }
        .notification.show { transform: translateY(0); opacity: 1; }
        .notification svg { width: 18px; height: 18px; }
        
        .sidebar-toggle { display: none; position: fixed; top: 16px; left: 16px; width: 44px; height: 44px; background: var(--bg-sidebar); border: none; border-radius: var(--radius-sm); color: #fff; cursor: pointer; z-index: 101; align-items: center; justify-content: center; }
        .sidebar-toggle svg { width: 24px; height: 24px; }
        
        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-toggle { display: flex; }
            .main-wrapper { margin-left: 0; }
            .header { padding-top: 80px; }
        }
        @media (max-width: 640px) {
            .tabs { flex-direction: column; }
            .attendees-grid { grid-template-columns: 1fr; }
            .summary-highlights { flex-direction: column; }
        }
    </style>
</head>
<body>
    <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg></div>
                <div><div>Meeting Portal</div><div style="font-size:11px;color:var(--text-muted);font-weight:400">Warehouse Operations</div></div>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">Import</div>
            <button class="import-granola-btn" onclick="showGranolaModal()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                Import from Granola
            </button>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">Meetings</div>
            <div class="meeting-list" id="meeting-list"></div>
            <button class="add-meeting-btn" onclick="window.location.href='create.html'"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>Create Meeting</button>
        </div>
        <div class="sidebar-footer">
            <div class="storage-info"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2"/></svg>Data saved in your browser</div>
        </div>
    </aside>

    <div class="main-wrapper"><div id="meeting-content"></div></div>

    <!-- Granola Import Modal -->
    <div class="modal-overlay" id="granola-modal">
        <div class="modal">
            <div class="modal-header"><h3>Import from Granola</h3><button class="modal-close" onclick="hideGranolaModal()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
            <div class="modal-body">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('url')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>Option A: Share URL</button>
                    <button class="tab-btn" onclick="switchTab('paste')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Option B: Paste Notes</button>
                </div>
                <div class="parsing-indicator" id="parsing-indicator"><div class="spinner"></div><span>Parsing Granola notes...</span></div>
                <div class="tab-content active" id="tab-url">
                    <div class="form-group">
                        <label class="form-label">Granola Share URL</label>
                        <input type="text" class="form-input" id="granola-url" placeholder="https://share.granola.ai/...">
                        <p class="form-hint"><strong>How:</strong> Open note in Granola → Click "Share" → Copy link</p>
                    </div>
                </div>
                <div class="tab-content" id="tab-paste">
                    <div class="form-group">
                        <label class="form-label">Paste Granola Notes</label>

                attendees: ['Shailendra', 'Shashank'],

                    { 
                        id: 1,

                    {

                        content: "FDA compliance requirements and regulatory updates.", 
                        details: ["Pharmacist register maintenance needed", "Legal team to handle FSSAI compliance", "HR minimum wage compliance to be resolved by 8th April"],
                        tags: ['Shashank', 'Shailendra'] 
                    }
                ],
                decisions: [
                    { id: 1, text: "Continue night cut-off and consolidated manifest processes for 90th percentile performance", tags: ['Shailendra'] },

                ],

                    { id: 1, task: "Increase ideal dispatch rate from 85% to 90-91%", status: "In Progress", statusClass: "status-pending", owners: ['Shailendra'], deadline: "Ongoing" },

                    { id: 6, task: "Resolve HR minimum wage compliance", status: "In Progress", statusClass: "status-pending", owners: ['Shashank'], deadline: "8 Apr 2026" }
                ]
            });

            // Previous Meeting - 18 March 2026
            meetings.push({
                id: 'meeting_18mar2026',
                date: '2026-03-18',
                title: 'Warehouse Operations & Transition Planning',
                summary: 'Strategic planning session focused on warehouse transitions and role reallocations. Key decisions include moving FSSAI, Pharmacist Management, and Insurance responsibilities from Shailendra to Quality and Finance teams. Unified transition tracker to be created for visibility. Control Tower initiative approved for centralized KPI monitoring across all warehouse tiers. AI & automation opportunities to be explored for productivity optimization.',
                attendees: ['Shailendra', 'Shashank', 'Manan', 'Vipul'],

                    { id: 1, title: "Reallocation of Shailendra's Responsibilities", content: "Managing responsibilities outside core warehousing:", details: ["FSSAI → Quality", "Pharmacist Mgmt → Quality", "Insurance → Finance"], tags: ['Shailendra'] },

                    { id: 3, title: "Warehouse Transition Planning", content: "Unified tracking for transitions:", details: ["Old → New ServiceLink", "Returns → Old ServiceLink"], tags: ['Vipul'] },

                ],

        function showGranolaModal() { document.getElementById('granola-modal').classList.add('show'); document.getElementById('granola-url').value = ''; document.getElementById('granola-paste').value = ''; }
        function hideGranolaModal() { document.getElementById('granola-modal').classList.remove('show'); }
        function showNewMeetingModal() { document.getElementById('new-meeting-modal').classList.add('show'); document.getElementById('meeting-date').valueAsDate = new Date(); document.getElementById('meeting-title').value = ''; }
        function hideNewMeetingModal() { document.getElementById('new-meeting-modal').classList.remove('show'); }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (tab === 'url' ? i === 0 : i === 1)));
            document.getElementById('tab-url').classList.toggle('active', tab === 'url');
            document.getElementById('tab-paste').classList.toggle('active', tab === 'paste');
        }

        function importGranola() {
            const indicator = document.getElementById('parsing-indicator');
            indicator.classList.add('show');
            setTimeout(() => {
                let parsed;
                if (currentTab === 'url') {
                    const url = document.getElementById('granola-url').value.trim();
                    if (!url) { alert('Please enter a Granola share URL'); indicator.classList.remove('show'); return; }
                    alert('Note: URL fetching requires a backend server.\n\nPlease use Option B (Paste Notes) instead.');
                    indicator.classList.remove('show'); return;
                } else {
                    const text = document.getElementById('granola-paste').value.trim();
                    if (!text) { alert('Please paste your Granola notes'); indicator.classList.remove('show'); return; }
                    parsed = parseGranolaText(text);
                }
                indicator.classList.remove('show');
                if (parsed) { meetings.unshift(parsed); saveMeetings(); renderMeetingList(); loadMeeting(parsed.id); hideGranolaModal(); showNotification('Meeting imported from Granola!'); }
            }, 800);
        }

        function parseGranolaText(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            let title = lines[0]?.length < 80 ? lines[0] : 'Imported Meeting';
            let dateStr = new Date().toISOString().split('T')[0];
            const dateMatch = text.match(/(\d{1,2}[\/-]\d{1,2}[\/-]\d{2,4})|(\w+ \d{1,2},? \d{4})|(\d{4}-\d{2}-\d{2})/);
            if (dateMatch) try { const d = new Date(dateMatch[0]); if (!isNaN(d)) dateStr = d.toISOString().split('T')[0]; } catch(e) {}
            
            const attendees = [];
            Object.keys(teamMembers).forEach(name => { if (text.toLowerCase().includes(name.toLowerCase())) attendees.push(name); });
            if (attendees.length === 0) attendees.push('Shailendra', 'Shashank', 'Manan', 'Vipul');

            const discussions = [];
            let discId = 1;
            const bullets = text.matchAll(/(?:^|\n)[-•●*]\s*(.{10,180})/gm);
            for (const m of bullets) { discussions.push({ id: discId++, title: m[1].substring(0, 60), content: m[1], details: [], tags: extractTags(m[1]) }); if (discussions.length >= 6) break; }
            if (discussions.length === 0) discussions.push({ id: 1, title: 'Meeting Notes', content: text.substring(0, 400), details: [], tags: [] });

            const actions = [];
            const actionMatch = text.match(/(?:Action Items?|Next Steps?|To.?Do)[:\s]*\n?([\s\S]*?)(?=(?:Decisions?|$))/i);
            if (actionMatch) {
                let actId = 1;
                actionMatch[1].split('\n').forEach(line => {
                    const c = line.replace(/^[-•●*\d.)\]]+\s*/, '').trim();
                    if (c.length > 5) actions.push({ id: actId++, task: c, status: 'Upcoming', statusClass: 'status-upcoming', owners: extractTags(c), deadline: 'TBD' });
                });
            }

            const decisions = [];
            const decMatch = text.match(/(?:Decisions?|Agreed)[:\s]*\n?([\s\S]*?)(?=(?:Action Items?|$))/i);
            if (decMatch) {
                let decId = 1;
                decMatch[1].split('\n').forEach(line => {
                    const c = line.replace(/^[-•●*\d.)\]]+\s*/, '').trim();
                    if (c.length > 5) decisions.push({ id: decId++, text: c, tags: extractTags(c) });
                });
            }

            return { id: 'meeting_' + Date.now(), date: dateStr, title, summary: '', attendees, discussions, decisions, actions };
        }

        function extractTags(text) { return Object.keys(teamMembers).filter(n => text.toLowerCase().includes(n.toLowerCase())); }

        function renderMeetingList() {
            const list = document.getElementById('meeting-list');
            list.innerHTML = [...meetings].sort((a, b) => new Date(b.date) - new Date(a.date)).map(m => {
                const d = new Date(m.date);
                const isToday = m.date === TODAY;
                return `<div class="meeting-item${m.id === currentMeetingId ? ' active' : ''}" onclick="loadMeeting('${m.id}')">
                    <div class="meeting-item-date">${d.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' })}${isToday ? '<span class="today-badge">Today</span>' : ''}</div>
                    <div class="meeting-item-title">${m.title}</div>
                    <div class="meeting-item-meta"><span>${d.toLocaleDateString('en-US', { weekday: 'short' })}</span><span>•</span><span>${m.actions?.length || 0} actions</span></div>
                </div>`;
            }).join('');
        }

        function loadMeeting(id) { currentMeetingId = id; const m = meetings.find(x => x.id === id); if (m) { renderMeetingList(); renderMeetingContent(m); } }

        }

        function renderMeetingContent(m) {
            const d = new Date(m.date);

            document.getElementById('meeting-content').innerHTML = `
                <header class="header"><div class="header-content">

                    <div class="header-meta">

                        <div class="header-meta-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>${m.attendees?.length || 0} Attendees</div>
                        <div class="header-meta-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>${m.actions?.length || 0} Actions</div>
                    </div>
                </div></header>
                <main class="container">
                    ${m.summary ? `<div class="summary-card">
                        <h3><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Executive Summary</h3>

                            <div class="summary-highlight"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>${m.discussions?.length || 0} Topics Discussed</div>
                            <div class="summary-highlight"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${m.decisions?.length || 0} Decisions Made</div>
                            <div class="summary-highlight"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>${m.actions?.length || 0} Action Items</div>
                        </div>
                    </div>` : ''}
                    <div class="stats-grid">
                        <div class="stat-card blue"><div class="stat-label">Discussions</div><div class="stat-value">${m.discussions?.length || 0}</div></div>

                    </div>
                    <div class="card"><div class="card-header" onclick="this.parentElement.classList.toggle('collapsed')"><h2><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>Attendees</h2><div class="card-toggle"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></div></div>
                        <div class="card-body"><div class="attendees-grid">${(m.attendees || []).map(n => { const t = teamMembers[n]; return t ? `<a href="mailto:${t.email}" class="attendee-card"><div class="attendee-avatar" style="background:${t.color}">${n.charAt(0)}</div><div><div class="attendee-name">${n}</div><div class="attendee-email">${t.email}</div></div></a>` : ''; }).join('')}</div></div></div>
                    <div class="card"><div class="card-header" onclick="this.parentElement.classList.toggle('collapsed')"><h2><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>Key Discussion Points</h2><div class="card-toggle"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></div></div>

                        <div class="card-body">${(m.decisions || []).map(dec => `<div class="decision-item"><div class="decision-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg></div><div><div class="decision-text">${dec.text}</div>${dec.tags?.length ? `<div class="discussion-tags" style="margin-top:8px">${dec.tags.map(t => createTagHTML(t)).join('')}</div>` : ''}</div></div>`).join('')}</div></div>

                </main>`;
        }

        function createNewMeeting() {
            const date = document.getElementById('meeting-date').value;
            const title = document.getElementById('meeting-title').value || 'New Meeting';
            const m = { id: 'meeting_' + Date.now(), date, title, summary: '', attendees: ['Shailendra', 'Shashank', 'Manan', 'Vipul'], discussions: [], decisions: [], actions: [] };
            meetings.unshift(m); saveMeetings(); renderMeetingList(); loadMeeting(m.id); hideNewMeetingModal();
        }

        function showNotification(msg) { const n = document.getElementById('notification'); document.getElementById('notification-text').textContent = msg; n.classList.add('show'); setTimeout(() => n.classList.remove('show'), 2500); }

        document.addEventListener('click', e => { if (!e.target.closest('.sidebar') && !e.target.closest('.sidebar-toggle')) document.getElementById('sidebar').classList.remove('open'); });
    </script>
</body>
</html>
